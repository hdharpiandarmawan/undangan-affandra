<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Khitan - Affandra</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Inter',sans-serif;
    background:#0c0c0c;
    color:#fff;
}

/* OPENING */
.opening{
    position:fixed;
    width:100%;
    height:100vh;
    background:radial-gradient(circle,#1a1a1a,#000);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
    text-align:center;
}

.opening button{
    margin-top:30px;
    padding:14px 35px;
    border:none;
    border-radius:40px;
    background:linear-gradient(135deg,#d4af37,#8b6f47);
    color:#000;
    cursor:pointer;
}

/* HERO */
.hero{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.9)),
    url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80');
    background-size:cover;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.hero h1{
    font-family:'Playfair Display',serif;
    font-size:48px;
}

.gold{color:#d4af37;}

.section{
    padding:80px 20px;
    text-align:center;
    max-width:900px;
    margin:auto;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:30px;
    border-radius:20px;
}

/* GALERI */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
}

.gallery img{
    width:100%;
    border-radius:10px;
    cursor:pointer;
}

/* PREVIEW */
#preview{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
}

#preview img{
    max-width:90%;
    max-height:90%;
}

/* BUTTON */
.btn{
    margin-top:20px;
    padding:12px 30px;
    background:#d4af37;
    border:none;
    border-radius:30px;
    cursor:pointer;
}

/* MUSIC */
.music-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    width:55px;
    height:55px;
    border-radius:50%;
    background:#d4af37;
    border:none;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- OPENING -->
<div class="opening" id="opening">
<h2>Undangan Khitan</h2>
<p id="guestName">Tamu Terhormat</p>
<button onclick="start()">Buka Undangan</button>
</div>

<!-- HERO -->
<section class="hero">
<h1 class="gold">Affandra</h1>
<h2>Harvi Devanka</h2>
</section>

<!-- DETAIL -->
<section class="section">
<div class="card">
<h2 class="gold">Detail Acara</h2>
<p>30 Mei 2026</p>
<p>08.00 WIB</p>
<p>Perumahan Citra Elok Jonggol<br>Blok B2 No.02</p>
</div>
</section>

<!-- DOA -->
<section class="section">
<div class="card">
<h2 class="gold">Doa</h2>
<p>
Ya Allah, jadikanlah Affandra anak yang sholeh,
kuat imannya, dan menjadi kebahagiaan bagi kedua orang tuanya.
</p>
</div>
</section>

<!-- MAP -->
<section class="section">
<iframe src="https://www.google.com/maps?q=-6.4691307975262875,107.05066549167019&output=embed"
style="width:100%;height:300px;border:none;border-radius:10px;"></iframe>
</section>

<section class="section">
<h2 class="gold">Galeri</h2>
<div class="gallery">
<img src="1.png">
</div>
</section>

<!-- PREVIEW -->
<div id="preview">
<img id="previewImg">
</div>

<!-- MUSIC -->
<audio id="music" loop>
<source src="123.mp3">
</audio>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<script>

/* START */
function start(){
    document.getElementById("opening").style.display="none";

    let music = document.getElementById("music");
    music.volume = 0;
    music.play();

    let vol = 0;
    let fade = setInterval(()=>{
        if(vol < 0.3){
            vol += 0.02;
            music.volume = vol;
        } else clearInterval(fade);
    },200);
}

/* MUSIC */
function toggleMusic(){
    let m=document.getElementById('music');
    if(m.paused){m.play()}else{m.pause()}
}

/* PREVIEW */
const imgs = document.querySelectorAll('.gallery img');
const preview = document.getElementById('preview');
const previewImg = document.getElementById('previewImg');

imgs.forEach(img=>{
    img.onclick = ()=>{
        preview.style.display='flex';
        previewImg.src = img.src;
    }
});

preview.onclick = ()=>preview.style.display='none';

/* NAMA TAMU */
const params=new URLSearchParams(window.location.search);
const name=params.get("to");
if(name){
    document.getElementById("guestName").innerText=name;
}

</script>

</body>
</html>
